name: pitreport
description: "PitReport - Fase 1: Autenticação"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  provider: ^6.1.5+1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/pitreport-icon-1024.png"
  adaptive_icon_background: "assets/images/pitreport-icon-1024.png"
  adaptive_icon_foreground: "assets/images/pitreport-icon-1024.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
