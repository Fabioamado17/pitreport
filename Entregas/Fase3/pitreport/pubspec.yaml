name: pitreport
description: "PitReport - Fase 3: Visualização, Mapa e Estatísticas"
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  image_picker: ^1.2.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  provider: ^6.1.5+1
  flutter_compass: ^0.8.0
  google_mlkit_face_detection: ^0.13.2
  intl: ^0.20.2
  fl_chart: ^1.2.0
  noise_meter: ^5.0.2
  permission_handler: ^11.3.0
  geoflutterfire_plus: ^0.0.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/pitreport-icon-1024.png"
  adaptive_icon_background: "assets/images/pitreport-icon-1024.png"
  adaptive_icon_foreground: "assets/images/pitreport-icon-1024.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
